<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --teal: #00d4ff;
    --teal2: #0099cc;
    --teal-dim: rgba(0,212,255,0.12);
    --green: #22c55e;
    --amber: #f59e0b;
    --blue: #60a5fa;
    --text: #e2e8f0;
    --muted: #64748b;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--teal), var(--teal2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 16px; color: #0a0e1a; letter-spacing: -1px;
  }
  .logo-text { font-size: 18px; font-weight: 700; color: var(--teal); letter-spacing: 0.5px; }
  .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .header-stats {
    display: flex; gap: 20px; margin-left: auto; align-items: center;
  }
  .stat {
    text-align: center;
  }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--teal); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .stat-divider { width: 1px; height: 32px; background: var(--border); }

  /* FILTERS */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
  .filter-btn.active { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
  .filter-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-online { background: var(--green); }
  .dot-construction { background: var(--amber); }
  .dot-planned { background: var(--blue); }
  .search-wrap { margin-left: auto; position: relative; }
  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px 5px 30px;
    border-radius: 20px;
    font-size: 12px;
    outline: none;
    width: 180px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--teal); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; }

  /* MAIN */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sidebar-section { padding: 12px 16px 6px; }
  .sidebar-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
  .site-card {
    padding: 10px 16px;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .site-card:hover { background: var(--surface2); border-left-color: var(--teal); }
  .site-card.active { background: var(--teal-dim); border-left-color: var(--teal); }
  .site-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .site-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
  .status-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-online { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-construction { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-planned { background: rgba(96,165,250,0.15); color: var(--blue); }

  /* MAP */
  #map { flex: 1; background: #0d1420; }

  /* TIMELINE PANEL */
  .timeline-panel {
    position: absolute;
    bottom: 0; left: 260px; right: 0;
    background: rgba(10,14,26,0.97);
    border-top: 1px solid var(--border);
    z-index: 1000;
    transition: height 0.3s ease;
    height: 200px;
  }
  .timeline-toggle {
    position: absolute;
    top: -32px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    color: var(--teal);
    padding: 6px 16px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .timeline-toggle:hover { background: var(--teal-dim); }
  .timeline-header {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .timeline-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--teal); font-weight: 600; }
  .timeline-scroll { padding: 16px 20px; overflow-x: auto; overflow-y: hidden; height: 150px; }
  .timeline-scroll::-webkit-scrollbar { height: 4px; }
  .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .timeline-inner { display: flex; align-items: center; gap: 0; position: relative; min-width: max-content; height: 100%; }
  .tl-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--teal2), var(--teal)); transform: translateY(-50%); }
  .tl-event {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    z-index: 2;
    margin: 0 18px;
  }
  .tl-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .tl-event:hover .tl-dot { transform: scale(1.4); }
  .tl-date { font-size: 9px; color: var(--muted); margin-top: 6px; white-space: nowrap; }
  .tl-label { font-size: 10px; color: var(--text); white-space: nowrap; max-width: 100px; text-align: center; margin-bottom: 6px; line-height: 1.2; }
  .tl-event .top { position: absolute; bottom: calc(50% + 12px); display: flex; flex-direction: column; align-items: center; }
  .tl-event .bot { position: absolute; top: calc(50% + 12px); display: flex; flex-direction: column; align-items: center; }

  /* TOOLTIP */
  .event-tooltip {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--teal);
    border-radius: 8px;
    padding: 12px 14px;
    min-width: 240px;
    max-width: 300px;
    z-index: 9999;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
  }
  .tooltip-date { font-size: 10px; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .tooltip-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .tooltip-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .tooltip-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .tooltip-tag { font-size: 10px; background: var(--teal-dim); color: var(--teal); padding: 2px 7px; border-radius: 10px; }

  /* LEAFLET CUSTOM */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--teal) !important;
    color: var(--text) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 14px 16px !important; }
  .popup-title { font-size: 15px; font-weight: 700; color: var(--teal); margin-bottom: 6px; }
  .popup-row { font-size: 12px; color: var(--muted); margin: 3px 0; }
  .popup-row span { color: var(--text); }
  .popup-chips { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .popup-chip { font-size: 10px; background: var(--teal-dim); color: var(--teal); padding: 2px 7px; border-radius: 10px; }
  .popup-desc { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 8px; }
  .leaflet-control-zoom a { background: var(--surface) !important; color: var(--teal) !important; border-color: var(--border) !important; }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
  .leaflet-tile { filter: brightness(0.7) saturate(0.4) hue-rotate(180deg) invert(1) hue-rotate(180deg) brightness(0.5) contrast(1.1); }
</style>

];

// Status colors
const statusColor = { online: '#22c55e', construction: '#f59e0b', planned: '#60a5fa' };
const statusLabel = { online: 'Online', construction: 'Under Construction', planned: 'Planned' };

// MW to radius
function mwToRadius(mw) {
  if (mw < 20) return 8;
  if (mw < 100) return 12;
  if (mw < 300) return 18;
  if (mw < 600) return 24;
  return 32;
}

let map, markers = [], activeSite = null, tlOpen = true;
let filterStatus = 'all', searchTerm = '';

function initMap() {
  map = L.map('map', { center: [45, -10], zoom: 3, zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
  renderMarkers();
  renderSidebar();
  renderTimeline();
}

function createMarker(site) {
  const col = statusColor[site.status];
  const r = mwToRadius(site.mw);
  const icon = L.divIcon({
    html: `<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${col};border:3px solid rgba(255,255,255,0.3);box-shadow:0 0 ${r}px ${col}88;display:flex;align-items:center;justify-content:center;font-size:${Math.max(8,r-4)}px;color:#000;font-weight:700;">${site.mw>=100?site.mw+'MW':''}</div>`,
    className: '',
    iconSize: [r*2, r*2],
    iconAnchor: [r, r],
    popupAnchor: [0, -r]
  });
  const m = L.marker([site.lat, site.lng], { icon }).addTo(map);
  const badgeClass = `badge-${site.status}`;
  m.bindPopup(`
    <div class="popup-title">${site.name}</div>
    <div class="popup-row">Status: <span><span class="status-badge ${badgeClass}">${statusLabel[site.status]}</span></span></div>
    <div class="popup-row">Capacity: <span>${site.mw} MW</span></div>
    <div class="popup-row">Region: <span>${site.region}</span></div>
    <div class="popup-row">Partner: <span>${site.partner}</span></div>
    <div class="popup-row">Expected Online: <span>${site.online}</span></div>
    <div class="popup-chips">${site.chips.map(c=>`<span class="popup-chip">${c}</span>`).join('')}</div>
    <div class="popup-desc">${site.desc}</div>
  `, { maxWidth: 300 });
  m.siteId = site.id;
  return m;
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const filtered = SITES.filter(s => {
    const matchStatus = filterStatus === 'all' || s.status === filterStatus;
    const matchSearch = !searchTerm || s.name.toLowerCase().includes(searchTerm.toLowerCase()) || s.region.toLowerCase().includes(searchTerm.toLowerCase());
    return matchStatus && matchSearch;
  });
  filtered.forEach(site => {
    const m = createMarker(site);
    markers.push(m);
    m.on('click', () => {
      activateSite(site.id);
    });
  });
  document.getElementById('site-count').textContent = filtered.length;
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const regions = [...new Set(SITES.map(s => s.region))];
  const filtered = SITES.filter(s => {
    const matchStatus = filterStatus === 'all' || s.status === filterStatus;
    const matchSearch = !searchTerm || s.name.toLowerCase().includes(searchTerm.toLowerCase());
    return matchStatus && matchSearch;
  });
  let html = '';
  regions.forEach(r => {
    const rsites = filtered.filter(s => s.region === r);
    if (!rsites.length) return;
    html += `<div class="sidebar-section"><div class="sidebar-title">${r}</div></div>`;
    rsites.forEach(s => {
      html += `<div class="site-card${activeSite===s.id?' active':''}" data-id="${s.id}">
        <div class="site-name">${s.name}</div>
        <div class="site-meta">
          <span class="status-badge badge-${s.status}">${statusLabel[s.status]}</span>
          <span>${s.mw} MW</span>
        </div>
      </div>`;
    });
  });
  sb.innerHTML = html;
  sb.querySelectorAll('.site-card').forEach(el => {
    el.addEventListener('click', () => {
      const id = +el.dataset.id;
      activateSite(id);
      const site = SITES.find(s => s.id === id);
      map.setView([site.lat, site.lng], 7, { animate: true });
      const m = markers.find(m => m.siteId === id);
      if (m) m.openPopup();
    });
  });
}

function activateSite(id) {
  activeSite = id;
  renderSidebar();
}

function renderTimeline() {
  const inner = document.getElementById('tlInner');
  let html = '<div class="tl-line"></div>';
  EVENTS.forEach((ev, i) => {
    const isTop = ev.pos === 'top';
    html += `<div class="tl-event" data-i="${i}">
      ${isTop ? `<div class="top"><div class="tl-label">${ev.label}</div></div>` : ''}
      <div class="tl-dot" style="background:${ev.color};"></div>
      ${!isTop ? `<div class="bot"><div class="tl-date">${ev.date}</div></div>` : `<div class="bot"><div class="tl-date">${ev.date}</div></div>`}
      ${!isTop ? `<div class="top" style="top:auto;bottom:calc(50% + 12px);"><div class="tl-label">${ev.label}</div></div>` : ''}
    </div>`;
  });
  inner.innerHTML = html;

  const tooltip = document.getElementById('evTooltip');
  inner.querySelectorAll('.tl-event').forEach(el => {
    const i = +el.dataset.i;
    const ev = EVENTS[i];
    el.addEventListener('mouseenter', (e) => {
      tooltip.innerHTML = `
        <div class="tooltip-date">${ev.date}</div>
        <div class="tooltip-title">${ev.title}</div>
        <div class="tooltip-desc">${ev.desc}</div>
        <div class="tooltip-tags">${ev.tags.map(t=>`<span class="tooltip-tag">${t}</span>`).join('')}</div>
      `;
      tooltip.style.display = 'block';
      posTooltip(e);
    });
    el.addEventListener('mousemove', posTooltip);
    el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });
}

function posTooltip(e) {
  const tt = document.getElementById('evTooltip');
  let x = e.clientX + 12, y = e.clientY - 80;
  if (x + 310 > window.innerWidth) x = e.clientX - 322;
  if (y < 0) y = 4;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

// Timeline toggle
let tlOpen2 = true;
document.getElementById('tlToggle').addEventListener('click', () => {
  const panel = document.getElementById('timelinePanel');
  tlOpen2 = !tlOpen2;
  panel.style.height = tlOpen2 ? '200px' : '0px';
  document.getElementById('tlToggle').textContent = tlOpen2 ? '▲ Timeline' : '▼ Timeline';
  panel.style.overflow = tlOpen2 ? 'visible' : 'hidden';
  setTimeout(() => map.invalidateSize(), 310);
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterStatus = btn.dataset.filter;
    renderMarkers();
    renderSidebar();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderMarkers();
  renderSidebar();
});

window.addEventListener('load', initMap);
</script>
</body>
</html>
